<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F43F5E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#1E1B4B"/>
  
  <!-- Left panel (original) -->
  <rect x="32" y="48" width="84" height="160" rx="12" fill="url(#grad1)"/>
  
  <!-- Right panel (modified) -->
  <rect x="140" y="48" width="84" height="160" rx="12" fill="url(#grad2)"/>
  
  <!-- Divider line -->
  <rect x="124" y="48" width="8" height="160" rx="4" fill="#3730A3"/>
  
  <!-- Diff indicator - left highlight -->
  <rect x="44" y="80" width="60" height="16" rx="4" fill="#FFFFFF" opacity="0.3"/>
  <rect x="44" y="108" width="40" height="16" rx="4" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- Diff indicator - right highlight (added) -->
  <rect x="152" y="80" width="60" height="16" rx="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="152" y="108" width="60" height="16" rx="4" fill="#FFFFFF" opacity="0.5"/>
  <rect x="152" y="136" width="48" height="16" rx="4" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- Connection arrows -->
  <path d="M 116 160 L 140 160" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <polygon points="136,156 140,160 136,164" fill="#FFFFFF" opacity="0.6"/>
</svg>
